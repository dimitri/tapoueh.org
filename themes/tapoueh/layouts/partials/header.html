<header class="site-header">
  <div class="wrap">
    <a class="wordmark" href="{{ "/" | relLangURL }}">{{ .Site.Params.author | default .Site.Title }}</a>
    <nav class="site-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="is-active"{{ end }}><span class="nav-ico">{{ partial "icon.html" .Identifier }}</span>{{ .Name }}</a>
      {{ end }}
      {{ with .Site.Params.subscribeURL }}<a class="nav-cta" href="{{ . }}">Subscribe</a>{{ end }}
      <a class="rss" href="{{ "/index.xml" | relLangURL }}" title="RSS feed" aria-label="RSS feed"><span class="nav-ico">{{ partial "icon.html" "rss" }}</span></a>
    </nav>
  </div>
</header>
