<footer class="site-footer">
  <div class="wrap">
    <div class="footer-grid">
      <div class="footer-bio">
        <div class="name">{{ .Site.Params.author }}</div>
        <p>{{ .Site.Params.bio }}</p>
      </div>
      <nav class="footer-links" aria-label="Social">
        {{ range .Site.Menus.social }}<a href="{{ .URL }}" rel="me">{{ partial "icon.html" .Identifier }}{{ .Name }}</a>{{ end }}
      </nav>
    </div>
    <div class="footer-eco">
      {{ range .Site.Menus.ecosystem }}<a href="{{ .URL }}">{{ .Name }}</a>{{ end }}
      <span>© {{ now.Year }} {{ .Site.Params.author }}</span>
    </div>
  </div>
</footer>
