<div class="post-meta">
  <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format (.Site.Params.dateFormat | default "Jan 2, 2006") }}</time>
  {{ if .ReadingTime }}<span class="dot">·</span><span>{{ .ReadingTime }} min read</span>{{ end }}
  {{ with .Params.tags }}<span class="dot">·</span><span class="tags">{{ range first 4 . }}<a class="tag" href="{{ "/tags/" | relLangURL }}{{ . | urlize }}/">#{{ . }}</a>{{ end }}</span>{{ end }}
</div>
