<article class="post-item">
  {{ with .Params.thumbnailImage }}<img class="post-thumb" src="{{ . | relURL }}" alt="" loading="lazy">{{ else }}{{ with .Params.icon }}<div class="post-icon">{{ . }}</div>{{ end }}{{ end }}
  <div class="body">
    {{ with .Params.categories }}<div class="eyebrow">{{ index . 0 }}</div>{{ end }}
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <p class="dek">{{ .Summary | plainify | chomp | truncate 170 }}</p>
    {{ partial "post-meta.html" . }}
  </div>
</article>
