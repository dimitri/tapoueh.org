{{ with .Paginator }}
{{ if gt .TotalPages 1 }}
<nav class="pagination reading" aria-label="Pagination">
  {{ if .HasPrev }}<a href="{{ .Prev.URL }}">← Newer</a>{{ else }}<span class="disabled">← Newer</span>{{ end }}
  <span>{{ .PageNumber }} / {{ .TotalPages }}</span>
  {{ if .HasNext }}<a href="{{ .Next.URL }}">Older →</a>{{ else }}<span class="disabled">Older →</span>{{ end }}
</nav>
{{ end }}
{{ end }}
