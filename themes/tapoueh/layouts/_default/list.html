{{ define "main" }}
<div class="wrap">
  <section class="page-intro reading">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="lede">{{ . }}</div>{{ end }}
  </section>
  {{ $paginator := .Paginate .Pages }}
  <section class="post-list reading">
    {{ range $paginator.Pages }}{{ partial "post-card.html" . }}{{ end }}
  </section>
  {{ partial "pagination.html" . }}
</div>
{{ end }}
