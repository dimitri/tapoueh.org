baseURL = "https://tapoueh.org/"
locale = "en-us"
title = "Dimitri Fontaine"
theme = "tapoueh"
publishDir = "docs"
enableRobotsTXT = true

[pagination]
  pagerSize = 12

# Analytics: add a GA4 (G-XXXX) id or a privacy-friendly tracker later.
disqusShortname = ""

[permalinks]
  post = "/blog/:year/:month/:slug/"
  page = "/:contentbasename/"
  conf = "/conf/:slug/"

[taxonomies]
  tag = "tags"
  category = "categories"
  archive = "archives"

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = false
    tabWidth = 2
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[params]
  author = "Dimitri Fontaine"
  bio = "PostgreSQL Major Contributor. I write about getting more out of SQL."
  description = "Dimitri Fontaine on PostgreSQL, SQL technique, and the craft of data — talks, articles, and open-source work."
  tagline = "Getting more out of PostgreSQL"
  intro = "Notes on SQL technique, data modeling, and PostgreSQL internals — from the author of *The Art of PostgreSQL*. New articles are built on the free Lab so you can run every query yourself."
  dateFormat = "Jan 2, 2006"

  # Ecosystem links (footer, About page, Lab note)
  bookURL = "https://theartofpostgresql.com"
  courseURL = "https://theartofpostgresql.com/course/"
  workshopURL = "https://theartofpostgresql.com/workshop/"
  labURL = "https://theartofpostgresql.com/lab/"
  ossURL = "https://oss.theartofpostgresql.com"

  # Mailing-list capture (the funnel). Create a dedicated tapoueh form in
  # ConvertKit, then set both values — until then the styled fallback shows.
  subscribeTitle = "SQL notes, now and then"
  subscribeBlurb = "Occasional PostgreSQL technique posts and Lab walkthroughs. No noise, unsubscribe anytime."
  # convertkitUid = "XXXXXXXXX"
  # convertkitSrc = "https://f.convertkit.com/XXXXXXXXX/YYYYYYYYY.js"
  # subscribeURL = "https://..."   # optional nav "Subscribe" link

