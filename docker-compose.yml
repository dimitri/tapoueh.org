# Local Hugo dev server via Docker — no local Go/Hugo toolchain needed.
#   make serve   → http://localhost:1313  (live reload, previews drafts + future-dated posts)
#   make build   → one-shot production build into ./docs
services:
  hugo:
    image: hugomods/hugo:exts
    working_dir: /src
    volumes:
      - .:/src
    ports:
      - "1313:1313"
    command: >
      hugo server
      --bind 0.0.0.0
      --port 1313
      --baseURL http://localhost:1313/
      --buildDrafts
      --buildFuture
      --disableFastRender
